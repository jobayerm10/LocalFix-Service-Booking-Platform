<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="heroGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="400" fill="url(#heroGradient)" />
  
  <!-- Decorative elements -->
  <circle cx="100" cy="50" r="40" fill="#60a5fa" opacity="0.3" />
  <circle cx="1100" cy="350" r="60" fill="#60a5fa" opacity="0.2" />
  <rect x="500" y="100" width="200" height="200" fill="#ffffff" opacity="0.05" rx="10" />
  
  <!-- Text placeholder -->
  <text x="600" y="150" font-size="48" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial, sans-serif">
    LocalFix Hero
  </text>
  <text x="600" y="250" font-size="24" fill="white" opacity="0.9" text-anchor="middle" font-family="Arial, sans-serif">
    Replace this with your own image
  </text>
</svg>
